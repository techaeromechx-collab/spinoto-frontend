<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Spinoto — Offline</title>
  <style>
    :root {
      --primary: #4CBB17;
      --primary-dark: #3a9e12;
      --bg: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      text-align: center;
      gap: 20px;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      box-shadow: 0 8px 24px rgba(76,187,23,0.3);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    p {
      font-size: 15px;
      color: var(--text-muted);
      max-width: 300px;
      line-height: 1.6;
    }

    .icon {
      font-size: 48px;
      opacity: 0.6;
    }

    .retry-btn {
      margin-top: 8px;
      padding: 12px 28px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .retry-btn:hover { background: var(--primary-dark); }
    .retry-btn:active { transform: scale(0.97); }

    .note {
      font-size: 13px;
      color: var(--border);
      border-top: 1px solid var(--border);
      padding-top: 16px;
      width: 100%;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">S</div>
    <span class="icon">📡</span>
    <h1>You're Offline</h1>
    <p>Spinoto needs an internet connection to load. Please check your network and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <p class="note">Data you've already viewed may still be available from cache.</p>
  </div>
</body>
</html>
